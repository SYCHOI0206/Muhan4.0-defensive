name: Update latest close

on:
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * 1-5'
      timezone: 'America/New_York'

permissions:
  contents: write

concurrency:
  group: update-latest-close
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest completed SOXL daily close
        env:
          TICKER: SOXL
          STOOQ_API_KEY: ${{ secrets.STOOQ_API_KEY }}
        run: python scripts/update_close.py

      - name: Commit updated quote
        run: |
          if git diff --quiet -- data/latest-close.json; then
            echo "No quote change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-close.json
          git commit -m "chore: update SOXL latest close"
          git push
